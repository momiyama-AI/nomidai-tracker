name: iOS CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          DEVICE_NAME=$(
            xcrun simctl list devices available |
              awk -F '[()]' '
                /^[[:space:]]*iPhone (16 Pro|16|15 Pro|15|14 Pro|14) / {
                  name = $1
                  sub(/^[[:space:]]*/, "", name)
                  sub(/[[:space:]]*$/, "", name)
                  print name
                  exit
                }
              '
          )
          if [ -z "$DEVICE_NAME" ]; then
            echo "No supported iPhone simulator was found." >&2
            exit 1
          fi
          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE_NAME"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project NomidaiTracker.xcodeproj \
            -scheme NomidaiTracker \
            -destination "platform=iOS Simulator,OS=latest,name=${{ steps.simulator.outputs.device_name }}" \
            CODE_SIGNING_ALLOWED=NO
